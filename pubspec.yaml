name: play_torrio_native
description: "PlayTorrio - Your cinema universe, Stream anything, anywhere."
publish_to: 'none'

version: 1.4.0+41

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.6.0
  cached_network_image: ^3.4.1
  carousel_slider: ^5.1.2
  path: ^1.9.1
  media_kit:
    git:
      url: https://github.com/AimesSoft/media-kit.git
      path: media_kit
  media_kit_video:
    git:
      url: https://github.com/AimesSoft/media-kit.git
      path: media_kit_video
  media_kit_libs_video:
    git:
      url: https://github.com/AimesSoft/media-kit.git
      path: libs/universal/media_kit_libs_video
  window_manager: ^0.5.1
  flutter_inappwebview: ^6.1.5
  shared_preferences: ^2.5.2
  shelf: ^1.4.1
  shelf_router: ^1.1.4
  shelf_proxy: ^1.0.4 
  html: ^0.15.4
  path_provider: ^2.1.5
  youtube_explode_dart: ^3.0.5
  logging: ^1.2.0
  audio_service: ^0.18.17
  audio_session: ^0.1.25
  url_launcher: ^6.3.1
  android_intent_plus: ^5.1.0
  flutter_secure_storage: ^9.2.4
  permission_handler: ^11.3.1
  connectivity_plus: 7.0.0
  screen_brightness: ^2.1.7
  volume_controller: ^3.4.1
  wakelock_plus: ^1.4.0
  google_fonts: ^8.0.2
  shimmer: ^3.0.0
  visibility_detector: ^0.4.0+2
  smooth_page_indicator: ^2.0.1
  transparent_image: ^2.0.1
  xml: ^6.5.0
  archive: ^4.0.4
  package_info_plus: ^9.0.0
  ota_update: ^7.1.0
  libtorrent_flutter: 1.8.5
  file_picker: ^8.0.0+1
  palette_generator: ^0.3.3+4
  pointycastle: ^3.9.1
  crypto: ^3.0.5
  flutter_js: ^0.8.0
  floating: ^5.0.0

dependency_overrides:
  media_kit:
    git:
      url: https://github.com/AimesSoft/media-kit.git
      path: media_kit
  media_kit_video:
    git:
      url: https://github.com/AimesSoft/media-kit.git
      path: media_kit_video
  media_kit_libs_video:
    git:
      url: https://github.com/AimesSoft/media-kit.git
      path: libs/universal/media_kit_libs_video
  media_kit_libs_android_video:
    git:
      url: https://github.com/AimesSoft/media-kit.git
      path: libs/android/media_kit_libs_android_video
  media_kit_libs_ios_video:
    git:
      url: https://github.com/AimesSoft/media-kit.git
      path: libs/ios/media_kit_libs_ios_video
  media_kit_libs_macos_video:
    git:
      url: https://github.com/AimesSoft/media-kit.git
      path: libs/macos/media_kit_libs_macos_video
  media_kit_libs_windows_video:
    git:
      url: https://github.com/AimesSoft/media-kit.git
      path: libs/windows/media_kit_libs_windows_video
  media_kit_libs_linux:
    git:
      url: https://github.com/AimesSoft/media-kit.git
      path: libs/linux/media_kit_libs_linux

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  windows:
    generate: true
    image_path: "assets/icon/icon.png"
    icon_size: 48
  image_path: "assets/icon/icon.png"

flutter:

  uses-material-design: true

  assets:
    - assets/icon/
    - assets/fonts/
    - assets/videasy/
    - assets/nuvio/